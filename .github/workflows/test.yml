name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

# see: https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
jobs:
  # tier-1
  # main development platform, gets features first and it's most tested
  ubuntu-latest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.25', '1.26']
    steps:
     - name: harden runner
       uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
       with:
         egress-policy: block
         disable-sudo: true
         allowed-endpoints: >
           github.com:443
           api.github.com:443
           proxy.github.com:443
           proxy.golang.org:443
           raw.githubusercontent.com:443
           objects.githubusercontent.com:443
           proxy.golang.org:443
           storage.googleapis.com:443
           release-assets.githubusercontent.com:443
           sum.golang.org:443
     - name: checkout code
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
     - name: setup go workspace
       run: go work init && go work use -r .
     - name: setup go
       uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
       with:
         cache: true
         go-version: ${{ matrix.go }}
         go-version-file: go.work
         cache-dependency-path: |
           go.work.sum
           **/go.sum
     - name: run tests
       run: make test

  ubuntu-2204:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        go: ['1.26']
    steps:
     - name: harden runner
       uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
       with:
         egress-policy: block
         disable-sudo: true
         allowed-endpoints: >
           github.com:443
           api.github.com:443
           proxy.github.com:443
           proxy.golang.org:443
           raw.githubusercontent.com:443
           objects.githubusercontent.com:443
           proxy.golang.org:443
           storage.googleapis.com:443
           release-assets.githubusercontent.com:443
           sum.golang.org:443
     - name: checkout code
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
     - name: setup go workspace
       run: go work init && go work use -r .
     - name: setup go
       uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
       with:
         cache: true
         go-version: ${{ matrix.go }}
         go-version-file: go.work
         cache-dependency-path: |
           go.work.sum
           **/go.sum
     - name: run tests
       run: make test

  windows-latest:
    runs-on: windows-latest
    strategy:
      matrix:
        go: ['1.25', '1.26']
    steps:
     - name: harden runner
       uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
       with:
         egress-policy: block
         disable-sudo: true
         allowed-endpoints: >
           github.com:443
           api.github.com:443
           proxy.github.com:443
           proxy.golang.org:443
           raw.githubusercontent.com:443
           objects.githubusercontent.com:443
           proxy.golang.org:443
           storage.googleapis.com:443
           release-assets.githubusercontent.com:443
           sum.golang.org:443
     - name: checkout code
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
     - name: setup go workspace
       run: go work init && go work use -r .
     - name: setup go
       uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
       with:
         cache: true
         go-version: ${{ matrix.go }}
         go-version-file: go.work
         cache-dependency-path: |
           go.work.sum
           **/go.sum
     - name: run tests
       run: make test

  # tier-2
  # best-effort support, limited to most recent platforms (OS+go)
  macos-latest:
    runs-on: macos-latest
    strategy:
      matrix:
        go: ['1.26']
    steps:
     - name: harden runner
       uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
       with:
         egress-policy: block
         disable-sudo: true
         allowed-endpoints: >
           github.com:443
           api.github.com:443
           proxy.github.com:443
           proxy.golang.org:443
           raw.githubusercontent.com:443
           objects.githubusercontent.com:443
           proxy.golang.org:443
           storage.googleapis.com:443
           release-assets.githubusercontent.com:443
           sum.golang.org:443
     - name: checkout code
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
     # macos-latest doesn't have Go preinstalled in the Github Actions runner
     # image, unlike all the other runner images. So, we need to manually
     # install it using brew and cache that installed Go, *then* create the Go
     # workspace.
     - name: cache brew
       uses: actions/cache@v4
       with:
         path: ~/Library/Caches/Homebrew
         key: ${{ runner.os }}-brew-${{ hashFiles('**/Formula/go.rb') }}
         restore-keys: |
           ${{ runner.os }}-brew-
     - name: install go
       run: brew install go
     - name: setup go workspace
       run: go work init && go work use -r .
     - name: setup go
       uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
       with:
         cache: true
         go-version: ${{ matrix.go }}
         go-version-file: go.work
         cache-dependency-path: |
           go.work.sum
           **/go.sum
     - name: run tests
       run: make test
